---
name: CI

on:
  push:
    branches: [main]
  # Run CI on every PR regardless of base branch — supports stacked PR
  # workflows where intermediate PRs target a feature branch, not main.
  pull_request:

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + feature-layout)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run blocking linters (lint-features + ruff)
        run: make lint
        # Mypy is intentionally out of `make lint` (the codebase is largely
        # untyped). Run `make typecheck` locally for advisory output; once
        # type coverage improves, add a typecheck job here.

  pre-commit:
    name: pre-commit (config + hygiene checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # pre-commit needs the previous commit to know what changed.
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  unit-tests:
    name: Unit tests (gateway service layer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/gateway/requirements.txt

      - name: Install gateway dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/gateway/requirements-test.txt

      - name: Run pure-unit tests
        # Service-layer + safe_sql + audit tests — no DB / Redis / NATS needed.
        env:
          JWT_SECRET_KEY: test-secret-key-for-unit-tests
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/15"
          NATS_URL: "nats://localhost:4222"
          PYTHONPATH: "services/gateway:shared"
        working-directory: services/gateway
        run: |
          python -m pytest \
            tests/unit/ \
            features/auth/tests/test_service.py \
            -v --tb=short

  contract-tests:
    # Phase 1: parses migrations/*.sql and verifies every Pydantic *Create
    # *Update field maps to a real column with a compatible type. No DB
    # needed — fails fast (~1s) when a model/schema misalignment lands.
    # Catches the PR #31 / #33 / #40 bug class.
    name: Contract tests (Pydantic ↔ DB schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/gateway/requirements.txt

      - name: Install gateway dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/gateway/requirements-test.txt

      - name: Run contract tests
        env:
          PYTHONPATH: "services/gateway:shared"
        working-directory: services/gateway
        run: python -m pytest tests/contracts/ -v --tb=short

  integration-postgres:
    # Phase 2: real Postgres + TimescaleDB via testcontainers. Each test
    # runs in a transaction that rolls back at teardown. Catches SQL that
    # compiles but blows up at execution time (PR #32 ":name::type" class,
    # missing columns, type-coercion mismatches).
    name: Integration tests (Postgres + TimescaleDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/gateway/requirements.txt

      - name: Install gateway dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/gateway/requirements-test.txt

      - name: Pre-pull TimescaleDB image
        # Done outside the test run so a slow first pull doesn't get blamed
        # on a flaky test fixture.
        run: docker pull timescale/timescaledb:latest-pg15

      - name: Run integration tests
        env:
          PYTHONPATH: "services/gateway:shared"
        working-directory: services/gateway
        run: python -m pytest tests/integration/ -v --tb=short

  integration-freeradius:
    # Phase 3: renders Jinja2 templates and runs `freeradius -CX` against
    # them in the same container image we ship to prod. Catches templates
    # that reference modules/methods that don't exist (PR #36 / #38 / #39).
    name: Integration tests (freeradius -CX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/gateway/requirements.txt

      - name: Install dependencies
        # The freeradius template tests need pytest + jinja2 + the docker
        # SDK (for the `docker info` skip-gate in conftest). Reusing the
        # gateway test requirements gives us pytest + docker; jinja2 is
        # the auth service's own dep, installed explicitly here since
        # there's no services/auth/requirements*.txt yet.
        run: |
          python -m pip install --upgrade pip
          pip install -r services/gateway/requirements-test.txt
          pip install jinja2

      - name: Pre-pull freeradius image
        run: docker pull freeradius/freeradius-server:3.2.3

      - name: Run freeradius -CX template tests
        run: python -m pytest services/auth/tests/integration/ -v --tb=short

  frontend-build:
    # Catches PRs that pass all backend CI but break the frontend build —
    # specifically the PR #60 / #61 class where a vite major bump's peer
    # deps don't satisfy npm ci's strict mode. Without this job, that PR
    # would have shown 6/6 ✓ and merged with a broken `npm run build`.
    name: Frontend build (npm ci + vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci (strict — catches peer-dep ERESOLVE)
        # Use plain `npm ci`, NOT `npm install --legacy-peer-deps`.
        # If a PR's lockfile resolves but its peer deps don't agree,
        # `npm ci` fails and we want CI to fail the same way prod does.
        run: npm ci

      - name: npm run build (vite production build)
        run: npm run build

      - name: npm audit (advisory — high+critical fail the job)
        # Medium/low advisories don't block; high+critical do, so a
        # vulnerable dep landing in main never goes unnoticed.
        # `|| true` on the report line lets us print the full list
        # before the gate. Suppression is via Dependabot dismissal,
        # not by silencing this job.
        run: |
          npm audit --omit=dev || echo "audit returned non-zero — see above"
          npm audit --omit=dev --audit-level=high
