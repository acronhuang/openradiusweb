---
# OpenRadiusWeb pre-commit hooks.
#
# Install once per clone:
#     pip install pre-commit
#     pre-commit install
# (or: `make install-hooks` — see Makefile)
#
# Hooks run on `git commit` against the staged files. To run against the
# whole tree manually: `pre-commit run --all-files`.

repos:
  # ---------------------------------------------------------------------
  # Built-in hygiene checks (whitespace, EOF, large files, merge markers).
  # ---------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-yaml
      - id: check-toml
      - id: check-json

  # ---------------------------------------------------------------------
  # Ruff — the official ruff-pre-commit hook bundles its own ruff binary,
  # so it works in CI without a separate `pip install ruff` step.
  # Pinned ref must match the ruff version we expect; bump together.
  # ---------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        files: '^(shared/|services/|scripts/)'

  # ---------------------------------------------------------------------
  # Project-specific local hook (no external dep needed).
  # ---------------------------------------------------------------------
  - repo: local
    hooks:
      # Enforce feature-oriented layout: no new files in
      # services/gateway/routes/ (per development-manual §10.6.3).
      - id: no-new-routes
        name: No new files in services/gateway/routes/
        entry: python scripts/check_no_new_routes.py
        language: system
        pass_filenames: false
        # Only run when the routes directory changes — fast on unrelated commits.
        files: '^services/gateway/(routes/|features/auth/__init__\.py|main\.py)|^scripts/check_no_new_routes\.py$'

      # Block plaintext writes to *_encrypted columns. Triggered when any
      # Python file under services/, scripts/, or shared/ changes — the
      # script itself filters to files that actually contain SQL writes.
      - id: encrypted-columns-wrapped
        name: '*_encrypted columns must be wrapped with encrypt_secret()'
        entry: python scripts/check_encrypted_columns_wrapped.py
        language: system
        types: [python]
        files: '^(services/|scripts/|shared/).*\.py$'
