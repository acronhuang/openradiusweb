server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA - all routes fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to gateway
    location /api/ {
        proxy_pass http://gateway:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for live auth feed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # API docs
    location /docs {
        proxy_pass http://gateway:8000/docs;
    }
    location /redoc {
        proxy_pass http://gateway:8000/redoc;
    }
    location /openapi.json {
        proxy_pass http://gateway:8000/openapi.json;
    }

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
