global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "orw-gateway"
    static_configs:
      - targets: ["gateway:8000"]
    metrics_path: /metrics

  - job_name: "nats"
    static_configs:
      - targets: ["nats:8222"]
    metrics_path: /varz

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:9187"]
