version: "3.9"

# ============================================================
# OpenRadiusWeb Production Deployment
# Web: ${ORW_WEB_PORT:-8888} | API: ${ORW_API_PORT:-8000}
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
# ============================================================

services:
  # ============================================================
  # Infrastructure
  # ============================================================
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: orw-postgres
    restart: always
    environment:
      POSTGRES_DB: orw
      POSTGRES_USER: orw
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"    # Only localhost
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./migrations/002_settings_radius_features.sql:/docker-entrypoint-initdb.d/02-settings-radius.sql
      - ./migrations/seed.sql:/docker-entrypoint-initdb.d/03-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orw"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orw-net

  redis:
    image: redis:7-alpine
    container_name: orw-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"                      # Only localhost
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orw-net

  nats:
    image: nats:2-alpine
    container_name: orw-nats
    restart: always
    command: "--js --sd /data --http_port 8222"
    ports:
      - "127.0.0.1:${NATS_PORT:-4222}:4222"        # Only localhost
      - "127.0.0.1:8222:8222"                       # Monitoring
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orw-net

  # ============================================================
  # Frontend (Nginx + React) - Port 8888
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    container_name: orw-frontend
    restart: always
    ports:
      - "${ORW_WEB_PORT:-8888}:80"                  # Web UI on 8888
    depends_on:
      gateway:
        condition: service_started
    networks:
      - orw-net

  # ============================================================
  # API Gateway
  # ============================================================
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: orw-gateway
    restart: always
    ports:
      - "${ORW_API_PORT:-8000}:8000"                # API
    environment:
      - DATABASE_URL=postgresql+asyncpg://orw:${DB_PASSWORD}@postgres:5432/orw
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - NATS_URL=nats://nats:4222
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # AES-256-GCM key material for at-rest secret columns. Without
      # these the gateway throws on the first read of an encrypted
      # column (LDAP bind password, NAS shared secret, cert key, etc.).
      - ORW_SECRET_MASTER=${ORW_SECRET_MASTER}
      - ORW_SECRET_KDF_SALT=${ORW_SECRET_KDF_SALT}
      # Server cert auto-renewal background task (PR #93 / #95). The
      # `:-N` form falls back to the in-code default when .env.production
      # doesn't set the var, so existing deployments need no change.
      # Operators set the env var to override (e.g. =3650 to force
      # renewal of certs further out, or =1 to test the flow quickly).
      - ORW_CERT_RENEW_THRESHOLD_DAYS=${ORW_CERT_RENEW_THRESHOLD_DAYS:-30}
      - ORW_CERT_RENEW_INTERVAL_HOURS=${ORW_CERT_RENEW_INTERVAL_HOURS:-6}
      # Backup status file path inside the container (PR #102). The
      # host's ./backups dir is mounted RO below; the file is written
      # by scripts/backup-and-rotate.sh on every scheduled backup run.
      - ORW_BACKUP_STATUS_PATH=/var/orw-backups/.last-status.json
    volumes:
      # Read-only mount so the /api/v1/health/backup endpoint can
      # report the most recent scheduled backup's status without
      # leaving a write path open.
      - ./backups:/var/orw-backups:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - orw-net

  # ============================================================
  # Application Services
  # ============================================================
  discovery:
    build:
      context: .
      dockerfile: services/discovery/Dockerfile
    container_name: orw-discovery
    restart: always
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      - DATABASE_URL=postgresql+asyncpg://orw:${DB_PASSWORD}@127.0.0.1:5432/orw
      - REDIS_URL=redis://:${REDIS_PASSWORD}@127.0.0.1:6379/0
      - NATS_URL=nats://127.0.0.1:4222
      - SCAN_INTERFACE=${SCAN_INTERFACE:-eth0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy

  device_inventory:
    build:
      context: .
      dockerfile: services/device_inventory/Dockerfile
    container_name: orw-device-inventory
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://orw:${DB_PASSWORD}@postgres:5432/orw
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - NATS_URL=nats://nats:4222
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - orw-net

  switch_mgmt:
    build:
      context: .
      dockerfile: services/switch_mgmt/Dockerfile
    container_name: orw-switch-mgmt
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://orw:${DB_PASSWORD}@postgres:5432/orw
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - NATS_URL=nats://nats:4222
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # snmp_community / coa_secret columns are encrypted at rest.
      - ORW_SECRET_MASTER=${ORW_SECRET_MASTER}
      - ORW_SECRET_KDF_SALT=${ORW_SECRET_KDF_SALT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - orw-net

  policy_engine:
    build:
      context: .
      dockerfile: services/policy_engine/Dockerfile
    container_name: orw-policy-engine
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://orw:${DB_PASSWORD}@postgres:5432/orw
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - NATS_URL=nats://nats:4222
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - orw-net

  # ============================================================
  # FreeRADIUS (802.1X Authentication)
  # ============================================================
  freeradius:
    build:
      context: .
      dockerfile: services/auth/Dockerfile.freeradius
    container_name: orw-freeradius
    restart: always
    ports:
      - "${RADIUS_AUTH_PORT:-1812}:1812/udp"        # RADIUS Auth
      - "${RADIUS_ACCT_PORT:-1813}:1813/udp"        # RADIUS Accounting
    environment:
      - ORW_DB_URL=postgresql://orw:${DB_PASSWORD}@postgres:5432/orw
      - ORW_NATS_URL=nats://nats:4222
      - ORW_TENANT_ID=${ORW_TENANT_ID:-}
      # rlm_orw.py (LDAP / MAB lookup) decrypts bind_password_encrypted.
      - ORW_SECRET_MASTER=${ORW_SECRET_MASTER}
      - ORW_SECRET_KDF_SALT=${ORW_SECRET_KDF_SALT}
      # Tells freeradius_config_manager to render sites with the orw
      # python module wired into authorize/authenticate/post-auth (the
      # filesystem detection of rlm_python3.so is unreliable inside the
      # container — see PR #76 root cause analysis).
      - ORW_HAS_PYTHON3=true
    volumes:
      - freeradius_config:/etc/freeradius/orw-managed
      - freeradius_certs:/etc/freeradius/certs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - orw-net

  freeradius_config_watcher:
    build:
      context: .
      dockerfile: services/auth/Dockerfile.config_watcher
    container_name: orw-freeradius-config-watcher
    restart: always
    environment:
      - ORW_DB_URL=postgresql://orw:${DB_PASSWORD}@postgres:5432/orw
      - NATS_URL=nats://nats:4222
      - FREERADIUS_CONTAINER=orw-freeradius
      - ORW_TEMPLATE_DIR=/app/templates
      # The watcher decrypts cert keys / bind passwords / etc. when
      # rendering freeradius config from the DB. Without these env vars
      # every render throws "Missing env var(s)" and the rendered
      # config falls back to an error stub (see config_manager.py).
      - ORW_SECRET_MASTER=${ORW_SECRET_MASTER}
      - ORW_SECRET_KDF_SALT=${ORW_SECRET_KDF_SALT}
      # Same reason as the freeradius service — filesystem detection
      # of rlm_python3.so doesn't work in this image.
      - ORW_HAS_PYTHON3=true
    volumes:
      - freeradius_config:/etc/freeradius/orw-managed
      - freeradius_certs:/etc/freeradius/certs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      freeradius:
        condition: service_started
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - orw-net

  # ============================================================
  # CoA Service (Change of Authorization)
  # ============================================================
  coa_service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile.coa
    container_name: orw-coa
    restart: always
    ports:
      - "${RADIUS_COA_PORT:-3799}:3799/udp"         # CoA listen (optional)
    environment:
      - DATABASE_URL=postgresql+asyncpg://orw:${DB_PASSWORD}@postgres:5432/orw
      - NATS_URL=nats://nats:4222
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # network_devices.coa_secret_encrypted is decrypted before
      # signing CoA / Disconnect-Request packets.
      - ORW_SECRET_MASTER=${ORW_SECRET_MASTER}
      - ORW_SECRET_KDF_SALT=${ORW_SECRET_KDF_SALT}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - orw-net

  # ============================================================
  # Monitoring (opt-in via `--profile monitoring`)
  #
  # Run with:
  #   docker compose -f docker-compose.prod.yml --env-file .env.production \
  #     --profile monitoring up -d
  #
  # Without --profile monitoring, these services don't start, so the
  # default deploy stays unaffected.
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: orw-prometheus
    restart: always
    profiles: ["monitoring"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"                       # localhost only
    networks:
      - orw-net

  grafana:
    image: grafana/grafana:11.3.0
    container_name: orw-grafana
    restart: always
    profiles: ["monitoring"]
    environment:
      # GRAFANA_PASSWORD already documented in .env.example. Defaults to
      # 'admin' if unset so first-boot doesn't crash, but the doc & PR
      # both flag this as required-before-production.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"                       # localhost only
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - orw-net

volumes:
  postgres_data:
  redis_data:
  nats_data:
  freeradius_config:
  freeradius_certs:
  prometheus_data:
  grafana_data:

networks:
  orw-net:
    driver: bridge
